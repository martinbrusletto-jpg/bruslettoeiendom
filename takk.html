<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Takk — Brusletto Eiendom</title>
  <meta name="description" content="Takk for henvendelsen. Vi tar kontakt personlig og i fortrolighet." />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#121a1f" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#172229;--paper:#f4efe7;--copper:#d8a27d}
    *{box-sizing:border-box}
    body{margin:0;min-height:100svh;display:grid;place-items:center;background:#121a1f;color:#f4efe7;font-family:Inter,system-ui,sans-serif;text-align:center;padding:32px}
    .eyebrow{text-transform:uppercase;letter-spacing:.3em;font-size:11px;color:var(--copper);font-weight:600;margin:0 0 22px;display:flex;align-items:center;justify-content:center;gap:12px}
    .eyebrow::before,.eyebrow::after{content:"";width:26px;height:1px;background:var(--copper)}
    h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(38px,6vw,72px);line-height:1.02;letter-spacing:-.03em;margin:0}
    p{max-width:440px;margin:26px auto 0;line-height:1.75;color:rgba(244,239,231,.72);font-size:16px}
    a{display:inline-block;margin-top:40px;color:#f4efe7;text-decoration:none;font-size:11px;letter-spacing:.24em;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--copper);transition:color .35s ease}
    a:hover{color:var(--copper)}
    a:focus-visible{outline:2px solid var(--copper);outline-offset:4px}
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Henvendelse mottatt</p>
    <h1>Takk.<br>Vi tar kontakt.</h1>
    <p>Din henvendelse er mottatt. Vi svarer personlig og i fortrolighet — vanligvis innen én virkedag.</p>
    <a href="/">Tilbake til forsiden</a>
  </main>
</body>
</html>
